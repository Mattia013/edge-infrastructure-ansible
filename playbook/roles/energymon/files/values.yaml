## Using default values from https://github.com/grafana/helm-charts/blob/main/charts/grafana/values.yaml
##
grafana:
  namespaceOverride: "monitoring"
  adminPassword: <grafana_password>

  ## Config to serve from sub_path https://github.com/prometheus-community/helm-charts/issues/201
  ##
  grafana.ini:
    server:
      domain: localhost
      #This string will be substituted by the energymon role (look at prometheus-grafana.yaml) with the proper IP
      root_url: "%(protocol)s://%(domain)s:%(http_port)s/grafana"
      serve_from_sub_path: true

  ## Override the auto-provisioned Prometheus/Alertmanager datasource URLs so
  ## they include the /prometheus route prefix set below (prometheusSpec.routePrefix).
  ## Without this, Grafana queries the bare service root, which 404s.
  sidecar:
    datasources:
      defaultDatasourceEnabled: false

  additionalDataSources:
    - name: "Prometheus"
      type: prometheus
      uid: prometheus
      url: http://prometheus-kube-prometheus-prometheus.monitoring:9090/prometheus/
      access: proxy
      isDefault: true
      jsonData:
        httpMethod: POST
        timeInterval: 30s
    - name: "Alertmanager"
      type: alertmanager
      uid: alertmanager
      url: http://prometheus-kube-prometheus-alertmanager.monitoring:9093/
      access: proxy
      jsonData:
        handleGrafanaManagedAlerts: false
        implementation: prometheus

  ingress:
    enabled: true
    ingressClassName: nginx
    annotations:
      # Redirect /grafana to /grafana/
      nginx.ingress.kubernetes.io/configuration-snippet: |
        rewrite ^(/grafana)$ $1/ redirect;
    labels: {}

    # Empty hosts array acts as a wildcard catch-all
    hosts: []

    ## Path for grafana ingress
    path: /grafana
    pathType: Prefix

    tls: []

prometheus:
  ingress:
    enabled: true
    ingressClassName: nginx
    annotations:
      nginx.ingress.kubernetes.io/configuration-snippet: |
        rewrite ^(/prometheus)$ $1/ redirect;

    # Empty hosts array acts as a wildcard catch-all
    hosts: []

    paths:
      - /prometheus
    pathType: Prefix

    tls: []

  prometheusSpec:
    externalUrl: "/prometheus/"
    routePrefix: "/prometheus/"
    
    listenLocal: false
    portName: http-web
    containers:
      - name: prometheus
        ports:
          - containerPort: 9090
            name: http-web
    service:
      port: 9090
      targetPort: 9090
