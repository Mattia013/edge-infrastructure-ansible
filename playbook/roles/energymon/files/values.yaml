## Using default values from https://github.com/grafana/helm-charts/blob/main/charts/grafana/values.yaml
##
grafana:
  namespaceOverride: "monitoring"
  adminPassword: <grafana_password>

  ## Config to serve from sub_path https://github.com/prometheus-community/helm-charts/issues/201
  ##
  grafana.ini:
    server:
      domain: localhost
      #This string will be substituted by the energymon role (look at prometheus-grafana.yaml) with the proper IP
      root_url: "%(protocol)s://%(domain)s:%(http_port)s/grafana"
      # FIXED: This must be true for the root_url to work properly without regex rewrites
      serve_from_sub_path: true

  ingress:
    enabled: true
    ingressClassName: nginx
    annotations:
      # FIXED: Removed the broken rewrite-target regex. 
      # Redirect /grafana to /grafana/
      nginx.ingress.kubernetes.io/configuration-snippet: |
        rewrite ^(/grafana)$ $1/ redirect;
    labels: {}

    # Empty hosts array acts as a wildcard catch-all
    hosts: []

    ## Path for grafana ingress
    path: /grafana
    pathType: Prefix

    tls: []

prometheus:
  ingress:
    enabled: true
    ingressClassName: nginx
    annotations:
      # FIXED: Removed the broken rewrite-target regex.
      nginx.ingress.kubernetes.io/configuration-snippet: |
        rewrite ^(/prometheus)$ $1/ redirect;

    # Empty hosts array acts as a wildcard catch-all
    hosts: []

    paths:
      - /prometheus
    pathType: Prefix

    tls: []

  prometheusSpec:
    # FIXED: Added trailing slash and set routePrefix to /
    externalUrl: "/prometheus/"
    routePrefix: "/"
    
    listenLocal: false
    portName: http-web
    containers:
      - name: prometheus
        ports:
          - containerPort: 9090
            name: http-web
    service:
      port: 9090
      targetPort: 9090
    
    # FIXED: The 'web.path' block has been completely removed to stop the Helm crash.
